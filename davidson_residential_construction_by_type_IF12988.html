<div style="padding:0.5rem 0;">
<h2 class="sr-only">Stacked column chart of Davidson County residential building permits by structure type, 2010 to 2024. Single-family stays near 3,000 to 4,000 a year while 5-plus-unit multifamily surges to a 2021 peak above 12,000.</h2>
<div id="lg" style="display:flex;gap:16px;margin-bottom:10px;font-size:12px;color:var(--text-secondary);"></div>
<div style="position:relative;width:100%;height:330px;">
<canvas id="c" role="img" aria-label="Davidson County residential building permits by structure type 2010-2024: single-family flat near 3,000-4,000 per year; 5+ unit multifamily rises from 553 in 2010 to a 2021 peak of 12,164 then falls.">Residential permits by type, 2010-2024.</canvas>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const years=[2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024];
const S=[
 ["1-unit (single-family)","#3f8e8e",[1041,1112,1342,1896,2584,3832,3815,3971,3666,3980,3708,4105,4031,3157,2722]],
 ["2–4 unit","#d99a00",[14,32,30,62,54,14,52,46,21,29,43,41,8,27,20]],
 ["5+ unit (multifamily)","#8a8a3f",[553,822,1591,2080,3775,4351,5699,2393,3247,5906,9573,12164,11246,8041,4138]]
];
document.getElementById('lg').innerHTML=S.map(s=>`<span style="display:flex;align-items:center;gap:5px;"><span style="width:11px;height:11px;border-radius:2px;background:${s[1]};"></span>${s[0]}</span>`).join('');
new Chart(document.getElementById('c'),{type:'bar',
 data:{labels:years,datasets:S.map(s=>({label:s[0],data:s[2],backgroundColor:s[1],borderWidth:0}))},
 options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
  plugins:{legend:{display:false}},
  scales:{x:{stacked:true,grid:{display:false},ticks:{color:'#898781',autoSkip:false,maxRotation:0}},
   y:{stacked:true,grid:{color:'#e1e0d9'},ticks:{color:'#898781'},title:{display:true,text:'permitted units',color:'#898781'}}}}
});
</script>
