<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Decade of Corporate Landlord Growth in Nashville</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  html,body,#map{height:100%;margin:0;padding:0;font-family:Garamond,Georgia,serif;}
  #title{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:5;
    background:rgba(255,255,255,.95);padding:9px 18px;border-radius:6px;text-align:center;
    box-shadow:0 1px 5px rgba(0,0,0,.2);max-width:92%;}
  #title h2{margin:0;font-size:16px;} #title p{margin:3px 0 0;font-size:11.5px;color:#555;}
  #ctrl{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:5;
    background:rgba(255,255,255,.97);padding:12px 20px;border-radius:8px;width:min(620px,92%);
    box-shadow:0 2px 8px rgba(0,0,0,.25);}
  #ctrl .row{display:flex;align-items:center;gap:14px;}
  #play{font-family:Garamond,serif;font-size:14px;padding:6px 14px;cursor:pointer;background:#6e1b16;color:#fff;border:none;border-radius:4px;min-width:74px;}
  #play:hover{background:#9b2a23;} #yr{font-size:30px;font-weight:bold;color:#6e1b16;min-width:72px;text-align:center;}
  #slider{flex:1;} #count{text-align:center;font-size:13px;margin-top:7px;} #count b{font-size:16px;color:#6e1b16;}
  #legend{position:absolute;top:78px;left:12px;z-index:5;background:rgba(255,255,255,.95);padding:8px 12px;border-radius:6px;font-size:11.5px;box-shadow:0 1px 4px rgba(0,0,0,.2);}
  #legend i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:middle;}
</style>
</head>
<body>
<div id="map"></div>
<div id="title"><h2>A Decade of Corporate Landlord Growth in Nashville</h2>
  <p>Each dot is a single-family home, placed in the year its current corporate owner acquired it. Drag the slider or press Play.</p></div>
<div id="legend"></div>
<div id="ctrl">
  <div class="row"><button id="play">▶ Play</button><span id="yr">2026</span>
    <input id="slider" type="range" min="2013" max="2026" value="2026" step="1"></div>
  <div id="count"><b id="ctot">0</b> corporate-owned homes acquired through <span id="cyr">2026</span></div>
</div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const COLOR=['match',['get','p'],
 'Tricon Residential','#8ce38f','American Homes 4 Rent','#2c719f','Progress Residential','#ffa4b1',
 'FirstKey Homes','#1f8166','Invitation Homes','#cf307a','Amherst Residential','#8dcaf0','#d5cc80'];
const map=new maplibregl.Map({container:'map',center:[-86.784,36.166],zoom:10,
  style:{version:8,sources:{
    base:{type:'raster',tileSize:256,attribution:'&copy; OpenStreetMap, &copy; CARTO',
      tiles:['https://a.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png']},
    labels:{type:'raster',tileSize:256,
      tiles:['https://a.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png']}},
    layers:[{id:'base',type:'raster',source:'base'},{id:'labels',type:'raster',source:'labels'}]}});
map.addControl(new maplibregl.NavigationControl(),'top-right');
let feats=[],year=2026;
function applyYear(y){year=y;
  document.getElementById('yr').textContent=y; document.getElementById('slider').value=y; document.getElementById('cyr').textContent=y;
  if(map.getLayer('dots')) map.setFilter('dots',['<=',['get','y'],y]);
  document.getElementById('ctot').textContent=feats.filter(f=>f.properties.y<=y).length.toLocaleString();
}
map.on('load',()=>{
  fetch('Davidson_County_Boundary.geojson').then(r=>r.json()).then(geo=>{
    map.addSource('cty',{type:'geojson',data:{type:'FeatureCollection',features:geo.features.filter(f=>f.properties.OBJECTID===4)}});
    map.addLayer({id:'cty',type:'line',source:'cty',paint:{'line-color':'#1a3a5c','line-width':2,'line-dasharray':[2,2]}});});
  fetch('Davidson_Corporate_Timeline.geojson').then(r=>r.json()).then(geo=>{
    feats=geo.features; map.addSource('t',{type:'geojson',data:geo});
    map.addLayer({id:'dots',type:'circle',source:'t',paint:{
      'circle-radius':['interpolate',['linear'],['zoom'],9,2.4,13,4,16,6],
      'circle-color':COLOR,'circle-opacity':0.85,'circle-stroke-width':0.4,'circle-stroke-color':'#fff'}});
    applyYear(2026);});
  document.getElementById('legend').innerHTML=
   '<div><i style="background:#ffa4b1"></i>Progress</div><div><i style="background:#2c719f"></i>AMH</div>'+
   '<div><i style="background:#8dcaf0"></i>Amherst</div><div><i style="background:#8ce38f"></i>Tricon</div>'+
   '<div><i style="background:#1f8166"></i>FirstKey</div><div><i style="background:#cf307a"></i>Invitation</div>'+
   '<div><i style="background:#d5cc80"></i>Other</div>';
});
document.getElementById('slider').addEventListener('input',e=>applyYear(+e.target.value));
let timer=null;
document.getElementById('play').addEventListener('click',function(){
  if(timer){clearInterval(timer);timer=null;this.textContent='▶ Play';return;}
  this.textContent='❚❚ Pause'; if(year>=2026) applyYear(2013);
  timer=setInterval(()=>{ if(year>=2026){clearInterval(timer);timer=null;document.getElementById('play').textContent='▶ Play';return;} applyYear(year+1); },650);
});
</script>
</body>
</html>
